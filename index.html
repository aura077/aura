<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | 077</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #333; }
        h1 { background: linear-gradient(45deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button { background: #3498db; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        #uploadSection { margin-top: 20px; display: none; }
        textarea { width: 100%; background: #111; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 10px; height: 80px; }
        .post { border-bottom: 1px solid #222; padding: 15px 0; }
        .post img, .post video { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Aura</h1>
            <button id="loginBtn">Кіру</button>
            <div id="userInfo"></div>
        </header>

        <div id="uploadSection">
            <textarea id="postText" placeholder="Не жаңалық?"></textarea>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <button id="shareBtn">Бөлісу</button>
        </div>

        <div id="feed"></div>
    </div>

    <script type="module">
        import { db, auth, provider } from './firebase-config.js';
        import { signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const CLOUD_NAME = "din5wpn5g";
        const UPLOAD_PRESET = "aura_preset";

        const loginBtn = document.getElementById('loginBtn');
        const uploadSection = document.getElementById('uploadSection');
        const feed = document.getElementById('feed');

        loginBtn.onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = "none";
                uploadSection.style.display = "block";
                document.getElementById('userInfo').innerText = user.displayName;
                loadPosts();
            }
        });

        document.getElementById('shareBtn').onclick = async () => {
            const text = document.getElementById('postText').value;
            const file = document.getElementById('fileInput').files[0];
            let mediaUrl = "";

            if (file) {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
                const data = await res.json();
                mediaUrl = data.secure_url;
            }

            await addDoc(collection(db, "posts"), {
                text, mediaUrl, authorName: auth.currentUser.displayName,
                authorPhoto: auth.currentUser.photoURL, timestamp: serverTimestamp()
            });
            alert("Дайын!");
        };

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snaps) => {
                feed.innerHTML = "";
                snaps.forEach(doc => {
                    const p = doc.data();
                    const el = document.createElement('div');
                    el.className = 'post';
                    el.innerHTML = `<b>${p.authorName}</b><p>${p.text}</p>${p.mediaUrl ? `<img src="${p.mediaUrl}">` : ''}`;
                    feed.appendChild(el);
                });
            });
        }
    </script>
</body>
</html>
