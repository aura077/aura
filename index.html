<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aura Evolution</title>
<style>
/* CSS: Заманауи айнымалылар мен қорғаныс */
:root {
  --p: #ff3b30; /* iOS Red */
  --s: #007aff; /* iOS Blue */
  --bg: #000;
  --txt: #fff;
  --card: rgba(28,28,30,0.8);
  --border: rgba(255,255,255,0.08);
}

body.light {
  --bg: #f9f9f9;
  --txt: #000;
  --card: rgba(255,255,255,0.85);
  --border: rgba(0,0,0,0.06);
}

/* ҚАТЕЛІККЕ ҚАРСЫ ШЕШІМ: */
/* Браузердің немесе телефонның автоматты іздеу/жарнама блоктарын (Скриншоттағыдай) алып тастау */
google-overlay-bottom, iframe[name^='google_ads_iframe'], .adsbygoogle {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  pointer-events: none !important;
}

body {
  margin:0;
  background: var(--bg);
  color: var(--txt);
  font-family: -apple-system, system-ui, sans-serif;
  overflow-x:hidden;
  transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.app {
  max-width:500px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:120px;
}

/* Стикер емес, Кәсіби SVG иконалары мен градиентті хедер */
header {
  position:sticky;
  top:0;
  background:rgba(var(--bg),0.8);
  backdrop-filter: blur(25px);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  border-bottom:0.5px solid var(--border);
}

h1 {
  font-size:26px;
  font-weight:900;
  letter-spacing:-1.5px;
  background:linear-gradient(135deg,#ff3b30,#ff9500);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
}

.welcome {
  position:fixed;
  inset:0;
  background:#000;
  z-index:2000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* Заманауи Google батырмасы (эмодзисіз) */
.g-btn {
  background:#fff;
  color:#000;
  border:none;
  padding:15px 30px;
  border-radius:50px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(255,255,255,0.1);
  transition: 0.3s;
}

.g-btn:active {
  transform: scale(0.92) rotate(-1deg);
}

#upload {
  background: var(--card);
  margin:15px;
  border-radius:30px;
  padding:20px;
  border:1px solid var(--border);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

textarea {
  width:100%;
  background:none;
  border:none;
  color:var(--txt);
  font-size:19px;
  outline:none;
  min-height:90px;
  resize:none;
  line-height:1.4;
}

.post {
  background: var(--card);
  margin:15px;
  border-radius:30px;
  padding:18px;
  border:0.1px solid var(--border);
  animation: fadeIn 0.5s;
}

.avatar {
  width:44px;
  height:44px;
  border-radius:15px;
  object-fit:cover;
  border: 1.5px solid var(--border);
}

.p-media img, .p-media video {
  width:100%;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* ЗАМАНАУИ НАВИГАЦИЯ: СТИКЕР ЕМЕС, SVG ИКОНАЛАР */
.nav {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:380px;
  height:70px;
  background:rgba(20,20,20,0.6);
  backdrop-filter: blur(25px);
  border-radius:35px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

.nav-i {
  fill: rgba(255,255,255,0.5);
  cursor:pointer;
  transition: 0.3s;
}

.nav-i:active {
  transform: scale(0.7);
}

.nav-i.active {
  fill: var(--p);
  filter: drop-shadow(0 0 10px var(--p));
}

.sh-btn {
  background:var(--s);
  color:#fff;
  border:none;
  padding:12px 28px;
  border-radius:20px;
  font-weight:700;
  transition: 0.2s;
}
.sh-btn:disabled { opacity:0.5; }

@keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body class="dark">

<div id="welcome" class="welcome">
    <h1>Aura</h1>
    <p style="opacity:0.6; margin-top:10px;">The Digital Consciousness</p>
    <div style="height:60px;"></div>
    <button class="g-btn" id="loginBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="22">
        Google-мен кіру
    </button>
</div>

<div class="app">
    <header>
        <h1>Aura</h1>
        <div id="uHead" style="display:none; align-items:center; gap:10px; cursor:pointer;" onclick="toggleSettings()">
            <img id="uPic" class="avatar" style="width:34px; height:34px;">
        </div>
    </header>

    <div id="upload">
        <select id="cat" class="cat-sel" style="width:100%; border:none; background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; margin-bottom:15px; outline:none; font-weight:700; ">
            <option value="" disabled selected>Категория</option>
            <option value="💡 Мотивация">💡 Мотивация</option>
            <option value="💻 Технология">💻 Технология</option>
            <option value="🦾 Спорт">🦾 Спорт</option>
            <option value="👨‍💻 Даму">👨‍💻 Даму</option>
        </select>
        <textarea id="text" placeholder="Бүгінгі ойың..."></textarea>
        <div id="prev"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <label for="fIn" style="font-size:32px; cursor:pointer; color:var(--s);">⊕</label>
            <input type="file" id="fIn" accept="image/*,video/*" style="display:none;">
            <button id="shBtn" class="sh-btn">Жариялау</button>
        </div>
    </div>

    <div id="feed"></div>

    <nav class="nav">
        <svg onclick="location.reload()" class="nav-i active" width="26" height="26" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg onclick="document.getElementById('text').focus()" class="nav-i" width="26" height="26" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <svg onclick="toggleSettings()" class="nav-i" width="26" height="26" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </nav>
</div>

<script type="module">
// [Firebase импорттары мен Config] - өзгеріссіз қалады
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { trackUserIP } from './ipscript.js';

const config = {
  apiKey: "AIzaSyCFikZSzeiVbulbnjRm5um4rLkJ03wmCQw",
  authDomain: "aura-077.firebaseapp.com",
  projectId: "aura-077",
  storageBucket: "aura-077.firebasestorage.app",
  messagingSenderId: "465157338528",
  appId: "1:465157338528:web:1db123ac3777237ba4e0c5"
};

const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);
const prov = new GoogleAuthProvider();

// [Логика: Вибрация қосылды, Эмодзи тексеру алынып тасталды]
const logB=document.getElementById("loginBtn"),wel=document.getElementById("welcome"),uH=document.getElementById("uHead"),uP=document.getElementById("uPic"),upd=document.getElementById("upload"),txt=document.getElementById("text"),fIn=document.getElementById("fIn"),shB=document.getElementById("shBtn"),pre=document.getElementById("prev"),fee=document.getElementById("feed"),cat=document.getElementById("cat");

loginBtn.onclick = () => {
    if(navigator.vibrate) navigator.vibrate(20); // КӨРІНБЕЙТІН ӘСЕР (Haptic feedback)
    signInWithPopup(auth, prov);
};

onAuthStateChanged(auth, user => {
  if(user){
    wel.style.opacity = "0"; setTimeout(()=>wel.style.display="none", 500);
    uH.style.display = "flex"; uP.src = user.photoURL;
    upd.style.display = "block";
    trackUserIP(db, collection, addDoc, serverTimestamp, user);
    loadFeed(user);
  } else {
    wel.style.display = "flex"; wel.style.opacity = "1";
    upd.style.display = "none";
  }
});

// [Файл тексеру мен жүктеу логикасы - өзгеріссіз]
fIn.onchange = e => {
  pre.innerHTML = "";
  const f = e.target.files[0];
  if(!f) return;
  const url = URL.createObjectURL(f);
  if(f.type.startsWith("video")){
    const v = document.createElement('video');
    v.src = url;
    v.onloadedmetadata = () => {
        if(v.duration > 35) { alert("Max 35s!"); fIn.value=""; return; }
        pre.innerHTML = `<video src="${url}" muted style="width:80px;border-radius:15px;"></video>`;
    };
  } else { pre.innerHTML = `<img src="${url}" style="width:80px;border-radius:15px;">`; }
};

shareBtn.onclick = async () => {
  if(!cat.value || !txt.value.trim()) return alert("Категория немесе мәтін бос!");
  shareBtn.disabled = true; shareBtn.innerText = "⏳";
  let mUrl = "", mType = "text";
  try {
    if(fIn.files[0]){
      const fd = new FormData();
      fd.append("file", fIn.files[0]);
      fd.append("upload_preset", "aura_preset");
      const r = await fetch(`https://api.cloudinary.com/v1_1/din5wpn5g/upload`, {method:"POST", body:fd});
      const d = await r.json();
      mUrl = d.secure_url;
      mType = fIn.files[0].type.split('/')[0];
    }
    await addDoc(collection(db, "posts"), {
      uid: auth.currentUser.uid,
      name: auth.currentUser.displayName,
      pic: auth.currentUser.photoURL,
      cat: cat.value,
      text: txt.value.trim(),
      media: mUrl,
      type: mType,
      time: serverTimestamp()
    });
    txt.value = ""; fIn.value = ""; pre.innerHTML = "";
  } catch(e) {} finally { shB.disabled = false; shB.innerText = "Жариялау"; }
};

// [Дизайн: Посттың ішіндегі категория мен профильді жаңарту]
function loadFeed(user) {
  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  onSnapshot(q, snap => {
    fee.innerHTML = "";
    snap.forEach(d => {
      const p = d.data();
      const isMe = user && p.uid === user.uid;
      let m = "";
      if(p.media){
        if(p.type==="image") m=`<div class="p-media"><img src="${p.media}" loading="lazy"></div>`;
        else if(p.type==="video") m=`<div class="p-media"><video src="${p.media}" controls></video></div>`;
      }
      const el = document.createElement("div");
      el.className = "post";
      el.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <img class="avatar" src="${p.pic}">
          <div>
            <div style="font-weight:700; font-size:15px;">${p.name}</div>
            <span style="font-size:10px; font-weight:800; color:var(--s); text-transform:uppercase; letter-spacing:1px; border:1px solid var(--border); padding:2px 8px; border-radius:10px; display:inline-block;">${p.cat}</span>
          </div>
          ${isMe ? `<span style="margin-left:auto; opacity:0.2" onclick="deleteDoc(doc(db,'posts','${d.id}'))">🗑️</span>` : ""}
        </div>
        <div style="font-size:16px; line-height:1.5;">${p.text}</div>
        ${m}
      `;
      feed.appendChild(el);
    });
  });
}

window.toggleSettings = () => {
    if(confirm("Шығу?")) signOut(auth);
};
</script>
</body>
</html>
