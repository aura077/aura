<!-- index.html кодының ішіндегі <script type="module"> бөлігін мынаған ауыстыр -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { trackUserIP } from './ipscript.js';

const config = {
  apiKey: "AIzaSyCFikZSzeiVbulbnjRm5um4rLkJ03wmCQw",
  authDomain: "aura-077.firebaseapp.com",
  projectId: "aura-077",
  storageBucket: "aura-077.firebasestorage.app",
  messagingSenderId: "465157338528",
  appId: "1:465157338528:web:1db123ac3777237ba4e0c5"
};

const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);
const prov = new GoogleAuthProvider();

const logB=document.getElementById("loginBtn"),wel=document.getElementById("welcome"),uH=document.getElementById("uHead"),uP=document.getElementById("uPic"),upd=document.getElementById("upload"),txt=document.getElementById("text"),shB=document.getElementById("shBtn"),fee=document.getElementById("feed"),cat=document.getElementById("cat");

loginBtn.onclick = () => {
    if(navigator.vibrate) navigator.vibrate(20);
    signInWithPopup(auth, prov);
};

onAuthStateChanged(auth, user => {
  if(user){
    wel.style.opacity = "0"; setTimeout(()=>wel.style.display="none", 500);
    uH.style.display = "flex"; uP.src = user.photoURL;
    upd.style.display = "block";
    trackUserIP(db, collection, addDoc, serverTimestamp, user);
    loadFeed(user);
  } else {
    wel.style.display = "flex"; wel.style.opacity = "1";
    upd.style.display = "none";
  }
});

// CLOUDINARY-СІЗ ЖАҢА ЖАРИЯЛАУ ФУНКЦИЯСЫ
shB.onclick = async () => {
  if(!cat.value || !txt.value.trim()) return alert("Категория немесе мәтін бос!");
  shB.disabled = true; shB.innerText = "⏳";
  
  try {
    // Тікелей Firebase Firestore-ға жазу
    await addDoc(collection(db, "posts"), {
      uid: auth.currentUser.uid,
      name: auth.currentUser.displayName,
      pic: auth.currentUser.photoURL,
      cat: cat.value,
      text: txt.value.trim(),
      media: "", // Сурет жіберілмейді
      type: "text",
      time: serverTimestamp()
    });
    txt.value = ""; 
    alert("Жарияланды!");
  } catch(e) {
    alert("Қате шықты: " + e.message);
  } finally { 
    shB.disabled = false; 
    shB.innerText = "Жариялау"; 
  }
};

function loadFeed(user) {
  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  onSnapshot(q, snap => {
    fee.innerHTML = "";
    snap.forEach(d => {
      const p = d.data();
      const isMe = user && p.uid === user.uid;
      const el = document.createElement("div");
      el.className = "post";
      el.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <img class="avatar" src="${p.pic}">
          <div>
            <div style="font-weight:700; font-size:15px;">${p.name}</div>
            <span style="font-size:10px; font-weight:800; color:var(--s); text-transform:uppercase; letter-spacing:1px; border:1px solid var(--border); padding:2px 8px; border-radius:10px; display:inline-block;">${p.cat}</span>
          </div>
          ${isMe ? `<span style="margin-left:auto; opacity:0.2; cursor:pointer;" onclick="deletePost('${d.id}')">🗑️</span>` : ""}
        </div>
        <div style="font-size:16px; line-height:1.5;">${p.text}</div>
      `;
      fee.appendChild(el);
    });
  });
}

// Өшіру функциясын глобалды қылдық
window.deletePost = async (id) => {
    if(confirm("Постты өшіру?")) {
        await deleteDoc(doc(db, "posts", id));
    }
}

window.toggleSettings = () => {
    if(confirm("Шығу?")) signOut(auth);
};
</script>
